<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 50%, #e0e7ff 100%);
    background-attachment: fixed;
    color: #0f172a;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { display: flex; min-height: 100vh; }

  .sidebar {
    width: 270px;
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 255, 255, 0.8);
    padding: 28px 18px;
    display: flex;
    flex-direction: column;
  }
  .sidebar h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 28px;
    padding: 0 10px;
    background: linear-gradient(135deg, #0ea5e9, #3b82f6, #6366f1);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sidebar h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    padding: 0 10px;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .project-list { list-style: none; flex: 1; overflow-y: auto; }
  .project-item {
    padding: 12px 14px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s ease;
    color: #334155;
    font-weight: 500;
  }
  .project-item:hover {
    background: rgba(255, 255, 255, 0.8);
    transform: translateX(2px);
  }
  .project-item.active {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: #fff;
    box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
  }
  .project-item .count {
    font-size: 11px;
    background: rgba(255,255,255,0.5);
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .project-item.active .count {
    background: rgba(255,255,255,0.35);
    color: #fff;
  }
  .proj-btn {
    opacity: 0;
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    margin-left: 4px;
    padding: 2px 4px;
  }
  .project-item:hover .proj-btn { opacity: 0.7; }
  .proj-btn:hover { opacity: 1 !important; }
  .project-item:not(.active) .proj-btn { color: #64748b; }
  .add-project {
    margin-top: 14px;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.5);
    border: 2px dashed #93c5fd;
    color: #2563eb;
    border-radius: 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    width: 100%;
    transition: all 0.2s;
  }
  .add-project:hover {
    background: rgba(255, 255, 255, 0.9);
    border-color: #3b82f6;
    transform: translateY(-1px);
  }

  .backup-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(147, 197, 253, 0.4);
  }
  .backup-btn {
    display: block;
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 6px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(147, 197, 253, 0.5);
    border-radius: 12px;
    color: #1e40af;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .backup-btn:hover {
    background: #fff;
    border-color: #3b82f6;
  }
  .backup-info {
    font-size: 10px;
    color: #64748b;
    padding: 6px 10px;
    text-align: center;
  }

  .main {
    flex: 1;
    padding: 36px 44px;
    overflow-y: auto;
  }
  .backup-banner {
    display: none;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 1px solid #fbbf24;
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 20px;
    color: #78350f;
    font-size: 13px;
    font-weight: 600;
    align-items: center;
    justify-content: space-between;
  }
  .backup-banner.show { display: flex; }
  .backup-banner button {
    background: #f59e0b;
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px dashed rgba(147, 197, 253, 0.5);
  }
  .header h2 {
    font-size: 26px;
    font-weight: 700;
    color: #0f172a;
  }
  .header .meta {
    font-size: 13px;
    color: #64748b;
    margin-top: 4px;
    font-weight: 500;
  }
  .btn-primary {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: #fff;
    border: none;
    padding: 11px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
    transition: all 0.2s;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
  }

  .search {
    width: 100%;
    padding: 13px 18px;
    border: 2px solid transparent;
    border-radius: 14px;
    font-size: 14px;
    margin-bottom: 22px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .search:focus {
    outline: none;
    border-color: #93c5fd;
    background: #fff;
  }

  .form-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 22px;
    display: none;
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.12);
  }
  .form-card.open { display: block; }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #475569;
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .form-row input, .form-row textarea {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid #dbeafe;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    background: #fff;
    color: #0f172a;
    transition: border-color 0.2s;
  }
  .form-row textarea { min-height: 90px; }
  .form-row input:focus, .form-row textarea:focus {
    outline: none;
    border-color: #93c5fd;
  }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-secondary {
    background: #fff;
    color: #475569;
    border: 2px solid #dbeafe;
    padding: 11px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: #93c5fd; }

  .entry {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 22px 24px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.08);
    transition: all 0.2s;
  }
  .entry:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(99, 102, 241, 0.15);
  }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .entry-date {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    padding: 6px 14px;
    border-radius: 20px;
  }
  .entry-actions { display: flex; gap: 4px; }
  .entry-actions button {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .entry-actions button:hover {
    color: #475569;
    background: #eff6ff;
  }
  .entry-section { margin-top: 12px; }
  .entry-section .label {
    font-size: 11px;
    font-weight: 700;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .entry-section .content {
    font-size: 14px;
    color: #0f172a;
    white-space: pre-wrap;
    line-height: 1.65;
  }
  .entry-section.learning .content {
    background: linear-gradient(135deg, #cffafe, #dbeafe);
    border-left: 4px solid #38bdf8;
    padding: 12px 16px;
    border-radius: 12px;
    color: #0f172a;
  }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: #94a3b8;
    font-size: 15px;
  }
  .empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h3 {
    font-size: 17px;
    margin-bottom: 18px;
    color: #0f172a;
    font-weight: 700;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #bfdbfe; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #93c5fd; }
</style>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <h1>📘 업무일지</h1>
    <h2>프로젝트</h2>
    <ul class="project-list" id="projectList"></ul>
    <button class="add-project" onclick="openProjectModal()">+ 새 프로젝트</button>

    <div class="backup-section">
      <h2>백업 & 복원</h2>
      <button class="backup-btn" onclick="exportBackup()">💾 백업 다운로드 (JSON)</button>
      <button class="backup-btn" onclick="document.getElementById('importFile').click()">📂 백업 파일 불러오기</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
      <div class="backup-info" id="lastBackupInfo">아직 백업한 적 없음</div>
    </div>
  </aside>

  <main class="main">
    <div class="backup-banner" id="backupBanner">
      <span>⚠️ 마지막 백업 후 7일이 지났어요. 안전을 위해 백업해주세요.</span>
      <button onclick="exportBackup()">지금 백업</button>
    </div>

    <div class="header">
      <div>
        <h2 id="currentProject">프로젝트를 선택하세요</h2>
        <div class="meta" id="entryCount"></div>
      </div>
      <button class="btn-primary" id="newEntryBtn" onclick="toggleForm()" style="display:none">+ 일지 작성</button>
    </div>

    <input type="text" class="search" id="search" placeholder="🔍 검색 (업무 내용, 러닝 포인트)" oninput="render()">

    <div class="form-card" id="formCard">
      <div class="form-row">
        <label>📅 날짜</label>
        <input type="date" id="entryDate">
      </div>
      <div class="form-row">
        <label>📝 업무 내용</label>
        <textarea id="entryWork" placeholder="오늘 진행한 업무를 기록하세요"></textarea>
      </div>
      <div class="form-row">
        <label>💡 러닝 포인트</label>
        <textarea id="entryLearning" placeholder="배운 점, 인사이트, 개선할 점"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="toggleForm()">취소</button>
        <button class="btn-primary" onclick="saveEntry()">저장</button>
      </div>
    </div>

    <div id="entries"></div>
  </main>
</div>

<div class="modal-bg" id="projectModal">
  <div class="modal">
    <h3>📘 새 프로젝트</h3>
    <div class="form-row">
      <input type="text" id="newProjectName" placeholder="프로젝트 이름" style="width:100%;padding:11px 14px;border:2px solid #dbeafe;border-radius:12px;font-size:14px">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeProjectModal()">취소</button>
      <button class="btn-primary" onclick="addProject()">생성</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'worklog-state';
const BACKUP_KEY = 'worklog-last-backup';
let state = { projects: [], currentProjectId: null, editingEntryId: null };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { console.error(e); }
  if (!state.projects || !state.projects.length) {
    state.projects = [{ id: 'p1', name: '샘플 프로젝트', entries: [] }];
    state.currentProjectId = 'p1';
    saveState();
  }
  if (!state.currentProjectId && state.projects.length) {
    state.currentProjectId = state.projects[0].id;
  }
  checkBackupReminder();
  render();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.error(e); alert('저장 실패: ' + e.message); }
}

function currentProject() {
  return state.projects.find(p => p.id === state.currentProjectId);
}

// ===== 백업/복원 =====
function exportBackup() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    state: state
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `worklog-backup-${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  localStorage.setItem(BACKUP_KEY, new Date().toISOString());
  checkBackupReminder();
  updateBackupInfo();
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.state || !data.state.projects) {
        alert('올바른 백업 파일이 아닙니다.');
        return;
      }
      const projCount = data.state.projects.length;
      const entryCount = data.state.projects.reduce((sum, p) => sum + (p.entries?.length || 0), 0);
      if (!confirm(`프로젝트 ${projCount}개, 일지 ${entryCount}개를 불러옵니다.\n현재 데이터는 덮어써집니다. 계속할까요?`)) {
        event.target.value = '';
        return;
      }
      state = data.state;
      saveState();
      render();
      alert('복원 완료!');
    } catch(err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function checkBackupReminder() {
  const last = localStorage.getItem(BACKUP_KEY);
  const banner = document.getElementById('backupBanner');
  const hasData = state.projects.some(p => p.entries.length > 0);
  if (!hasData) { banner.classList.remove('show'); return; }
  if (!last) {
    banner.classList.add('show');
    return;
  }
  const daysSince = (Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24);
  if (daysSince >= 7) banner.classList.add('show');
  else banner.classList.remove('show');
}

function updateBackupInfo() {
  const last = localStorage.getItem(BACKUP_KEY);
  const info = document.getElementById('lastBackupInfo');
  if (!last) { info.textContent = '아직 백업한 적 없음'; return; }
  const d = new Date(last);
  const daysSince = Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  info.textContent = daysSince === 0 ? `오늘 백업함 ✓` : `${dateStr} (${daysSince}일 전)`;
}

// ===== 렌더링 =====
function render() {
  const list = document.getElementById('projectList');
  list.innerHTML = state.projects.map(p => `
    <li class="project-item ${p.id === state.currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <span>${escapeHtml(p.name)}</span>
      <span style="display:flex;align-items:center;gap:2px">
        <span class="count">${p.entries.length}</span>
        <button class="proj-btn" title="이름 변경" onclick="event.stopPropagation();renameProject('${p.id}')">✎</button>
        <button class="proj-btn" title="삭제" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</button>
      </span>
    </li>
  `).join('');

  updateBackupInfo();

  const proj = currentProject();
  const newBtn = document.getElementById('newEntryBtn');
  if (!proj) {
    document.getElementById('currentProject').textContent = '프로젝트를 선택하세요';
    document.getElementById('entries').innerHTML = '';
    document.getElementById('entryCount').textContent = '';
    newBtn.style.display = 'none';
    return;
  }
  document.getElementById('currentProject').textContent = proj.name;
  document.getElementById('entryCount').textContent = `총 ${proj.entries.length}개의 일지`;
  newBtn.style.display = 'block';

  const q = document.getElementById('search').value.toLowerCase();
  const filtered = proj.entries
    .filter(e => !q || (e.work + e.learning).toLowerCase().includes(q))
    .sort((a,b) => b.date.localeCompare(a.date));

  const ec = document.getElementById('entries');
  if (!filtered.length) {
    ec.innerHTML = '<div class="empty"><span class="emoji">🌊</span>아직 작성된 일지가 없어요<br>"+ 일지 작성"을 눌러 시작해보세요</div>';
    return;
  }
  ec.innerHTML = filtered.map(e => `
    <div class="entry">
      <div class="entry-header">
        <div class="entry-date">${formatDate(e.date)}</div>
        <div class="entry-actions">
          <button onclick="editEntry('${e.id}')">수정</button>
          <button onclick="deleteEntry('${e.id}')">삭제</button>
        </div>
      </div>
      <div class="entry-section">
        <div class="label">📝 업무 내용</div>
        <div class="content">${escapeHtml(e.work)}</div>
      </div>
      ${e.learning ? `
      <div class="entry-section learning">
        <div class="label">💡 러닝 포인트</div>
        <div class="content">${escapeHtml(e.learning)}</div>
      </div>` : ''}
    </div>
  `).join('');
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}

function selectProject(id) {
  state.currentProjectId = id;
  state.editingEntryId = null;
  document.getElementById('formCard').classList.remove('open');
  saveState();
  render();
}

function openProjectModal() {
  document.getElementById('projectModal').classList.add('open');
  document.getElementById('newProjectName').value = '';
  document.getElementById('newProjectName').focus();
}
function closeProjectModal() {
  document.getElementById('projectModal').classList.remove('open');
}
function addProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) return;
  const id = 'p' + Date.now();
  state.projects.push({ id, name, entries: [] });
  state.currentProjectId = id;
  saveState();
  closeProjectModal();
  render();
}
function deleteProject(id) {
  if (!confirm('이 프로젝트와 모든 일지를 삭제할까요?')) return;
  state.projects = state.projects.filter(p => p.id !== id);
  if (state.currentProjectId === id) {
    state.currentProjectId = state.projects[0]?.id || null;
  }
  saveState();
  render();
}
function renameProject(id) {
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  const name = prompt('새 프로젝트 이름:', proj.name);
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed) return;
  proj.name = trimmed;
  saveState();
  render();
}

function toggleForm() {
  const form = document.getElementById('formCard');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    if (!state.editingEntryId) {
      document.getElementById('entryDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('entryWork').value = '';
      document.getElementById('entryLearning').value = '';
    }
  } else {
    state.editingEntryId = null;
  }
}

function editEntry(id) {
  const proj = currentProject();
  const e = proj.entries.find(x => x.id === id);
  if (!e) return;
  state.editingEntryId = id;
  document.getElementById('entryDate').value = e.date;
  document.getElementById('entryWork').value = e.work;
  document.getElementById('entryLearning').value = e.learning;
  document.getElementById('formCard').classList.add('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

function saveEntry() {
  const proj = currentProject();
  if (!proj) return;
  const date = document.getElementById('entryDate').value;
  const work = document.getElementById('entryWork').value.trim();
  const learning = document.getElementById('entryLearning').value.trim();
  if (!date || !work) { alert('날짜와 업무 내용은 필수입니다.'); return; }

  if (state.editingEntryId) {
    const e = proj.entries.find(x => x.id === state.editingEntryId);
    Object.assign(e, { date, work, learning });
    state.editingEntryId = null;
  } else {
    proj.entries.push({ id: 'e' + Date.now(), date, work, learning });
  }
  saveState();
  document.getElementById('formCard').classList.remove('open');
  render();
}

function deleteEntry(id) {
  if (!confirm('이 일지를 삭제할까요?')) return;
  const proj = currentProject();
  proj.entries = proj.entries.filter(e => e.id !== id);
  saveState();
  render();
}

loadState();
</script>
</body>
</html>
